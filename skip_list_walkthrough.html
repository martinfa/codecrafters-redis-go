<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skip List Span Walkthrough</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --soft: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --green: #34d399;
      --yellow: #fbbf24;
      --purple: #c084fc;
      --red: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    h1, h2, h3 { margin: 0; }
    h1 { font-size: 1.55rem; }
    h2 { font-size: 1.05rem; margin-bottom: 10px; }
    h3 { font-size: 0.95rem; margin-bottom: 8px; }

    .lead {
      margin: 8px 0 18px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.25fr 0.85fr;
      gap: 16px;
    }

    @media (max-width: 950px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    button, select {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }

    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }

    .case-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(96, 165, 250, 0.45);
      background: rgba(96, 165, 250, 0.12);
      color: #bfdbfe;
      font-size: 0.78rem;
      font-weight: 650;
    }

    .step-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .explain {
      margin: 0;
      color: var(--muted);
    }

    .state {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .level-row {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: center;
    }

    .level-name {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    .lane {
      display: flex;
      align-items: center;
      min-height: 48px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .node {
      flex: 0 0 auto;
      min-width: 82px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 8px;
      text-align: center;
      background: #0b1220;
    }

    .node.head { border-color: var(--purple); color: #e9d5ff; }
    .node.current { outline: 2px solid var(--yellow); }
    .node.target { outline: 2px solid var(--green); }
    .node.new-node { outline: 2px solid var(--accent); }

    .member { font-weight: 750; }
    .score { color: var(--muted); font-size: 0.76rem; }

    .edge {
      flex: 0 0 auto;
      min-width: 78px;
      height: 2px;
      background: var(--line);
      position: relative;
      margin: 0 6px;
    }

    .edge::after {
      content: "";
      position: absolute;
      right: -1px;
      top: -4px;
      border-left: 8px solid var(--line);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }

    .span-label {
      position: absolute;
      left: 50%;
      top: -20px;
      transform: translateX(-50%);
      color: var(--yellow);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .ground {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .ground-item {
      border: 1px solid var(--line);
      background: #0b1220;
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 86px;
    }

    .rank {
      color: var(--green);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .debug-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .debug-card {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .debug-label {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 3px;
    }

    .debug-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      color: #dbeafe;
      font-size: 0.82rem;
    }

    .case-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .case-list button {
      text-align: left;
      width: 100%;
    }

    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Skip List Span Walkthrough</h1>
    <p class="lead">
      Deterministic example for debugging spans: fixed node heights, every step shows the full skip list state.
      Span labels always count level-0 members skipped by that arrow.
    </p>

    <div class="controls">
      <button id="previous">Previous</button>
      <button id="next">Next</button>
      <button id="reset">Reset</button>
      <select id="stepSelect"></select>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="step-title">
          <div>
            <span id="caseChip" class="case-chip"></span>
            <h2 id="stepTitle"></h2>
          </div>
          <div id="stepCounter" class="muted"></div>
        </div>
        <p id="explain" class="explain"></p>

        <div id="state" class="state"></div>

        <h3 style="margin-top: 16px;">Ground Chain</h3>
        <div id="groundChain" class="ground"></div>
      </section>

      <aside class="panel">
        <h2>Debugger Values</h2>
        <div id="debugValues" class="debug-grid"></div>

        <h2 style="margin-top: 16px;">Code Shape</h2>
        <pre id="codeShape"></pre>

        <h2 style="margin-top: 16px;">Jump To Case</h2>
        <div class="case-list">
          <button data-case="insert-tall-node">insert-tall-node: first/tall node grows list</button>
          <button data-case="insert-front">insert-front: insert before current first</button>
          <button data-case="insert-tail">insert-tail: insert at the end</button>
          <button data-case="insert-middle">insert-middle: insert between nodes</button>
          <button data-case="insert-short-node">insert-short-node: update spans above short node</button>
          <button data-case="get-rank">get-rank: member to rank</button>
          <button data-case="range-by-rank">range-by-rank: rank to members</button>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const groundLevel = 0;
    const maxLevel = 4;

    class Node {
      constructor(member, score, level) {
        this.member = member;
        this.score = score;
        this.forward = Array(level).fill(null);
        this.span = Array(level).fill(0);
      }

      label() {
        return this.member === "HEAD" ? "HEAD" : `${this.member}`;
      }
    }

    class WalkthroughSkipList {
      constructor() {
        this.head = new Node("HEAD", Number.NEGATIVE_INFINITY, maxLevel);
        this.level = 1;
        this.length = 0;
      }

      compare(leftNode, score, member) {
        if (leftNode.score < score) return -1;
        if (leftNode.score > score) return 1;
        if (leftNode.member < member) return -1;
        if (leftNode.member > member) return 1;
        return 0;
      }

      snapshot(title, caseId, explain, debug = {}, code = "") {
        steps.push({
          title,
          caseId,
          explain,
          debug,
          code,
          list: this.serialize()
        });
      }

      serialize() {
        const levels = [];
        for (let level = this.level - 1; level >= 0; level--) {
          const lane = [];
          let current = this.head;
          while (current) {
            lane.push({
              member: current.member,
              score: current.score,
              span: current.span[level] ?? null,
              hasNext: Boolean(current.forward[level])
            });
            current = current.forward[level] ?? null;
          }
          levels.push({ level, lane });
        }

        const ground = [];
        let current = this.head.forward[groundLevel];
        let rank = 0;
        while (current) {
          ground.push({ member: current.member, score: current.score, rank });
          rank++;
          current = current.forward[groundLevel];
        }

        return { level: this.level, length: this.length, levels, ground };
      }

      insert(score, member, newNodeLevel, caseId) {
        const nodeBeforeInsertAtLevel = Array(maxLevel).fill(null);
        const sortedPositionAtLevel = Array(maxLevel).fill(0);
        let current = this.head;
        const topLevel = this.level - 1;

        this.snapshot(
          `Start Insert(${score}, "${member}")`,
          caseId,
          "Start at HEAD on the top level. Search will save one bookmark per level.",
          { member, score, newNodeLevel, current: "HEAD", topLevel },
          `nodeBeforeInsertAtLevel := bookmarks\nsortedPositionAtLevel := distance counters\ncurrent := HEAD`
        );

        for (let searchLevel = topLevel; searchLevel >= groundLevel; searchLevel--) {
          if (searchLevel === topLevel) {
            sortedPositionAtLevel[searchLevel] = 0;
          } else {
            sortedPositionAtLevel[searchLevel] = sortedPositionAtLevel[searchLevel + 1];
          }

          this.snapshot(
            `Search level ${searchLevel}`,
            caseId,
            "When dropping to a lower level, keep the same sorted position because current did not reset to HEAD.",
            {
              searchLevel,
              current: current.label(),
              sortedPositionAtLevel: printableArray(sortedPositionAtLevel, this.level),
              inheritedFromAbove: searchLevel === topLevel ? "top level starts at 0" : sortedPositionAtLevel[searchLevel + 1]
            },
            `if top level: position = 0\nelse: position = position from level above`
          );

          while (true) {
            const nextNode = current.forward[searchLevel];
            if (!nextNode) break;
            if (this.compare(nextNode, score, member) >= 0) break;

            const groundChainMembersSkipped = current.span[searchLevel];
            sortedPositionAtLevel[searchLevel] += groundChainMembersSkipped;
            current = nextNode;

            this.snapshot(
              `Hop on level ${searchLevel}`,
              caseId,
              "The next node sorts before the insert target, so hop to it and add that arrow's span.",
              {
                searchLevel,
                hoppedTo: current.label(),
                groundChainMembersSkipped,
                sortedPositionAtLevel: printableArray(sortedPositionAtLevel, this.level)
              },
              `groundChainMembersSkipped := current.spanToNextAtLevel(searchLevel)\nsortedPositionAtLevel[searchLevel] += groundChainMembersSkipped\ncurrent = nextNode`
            );
          }

          nodeBeforeInsertAtLevel[searchLevel] = current;
          this.snapshot(
            `Bookmark level ${searchLevel}`,
            caseId,
            "Search stopped at this level; this node is the node before the insert target for this level.",
            {
              searchLevel,
              nodeBeforeInsertAtLevel: printableNodes(nodeBeforeInsertAtLevel, this.level),
              sortedPositionAtLevel: printableArray(sortedPositionAtLevel, this.level)
            },
            `nodeBeforeInsertAtLevel[searchLevel] = current`
          );
        }

        const newNode = new Node(member, score, newNodeLevel);

        if (newNodeLevel > this.level) {
          for (let newLevel = this.level; newLevel < newNodeLevel; newLevel++) {
            nodeBeforeInsertAtLevel[newLevel] = this.head;
            sortedPositionAtLevel[newLevel] = 0;
            this.head.span[newLevel] = this.length;
          }
          this.level = newNodeLevel;

          this.snapshot(
            "New node grows the top level",
            caseId,
            "The new node is taller than the old list, so HEAD becomes the bookmark on each new top level.",
            {
              newNodeLevel,
              activeListLevel: this.level,
              headSpanOnNewLevels: "old length"
            },
            `nodeBeforeInsertAtLevel[newLevel] = HEAD\nsortedPositionAtLevel[newLevel] = 0\nHEAD.span[newLevel] = old length`
          );
        }

        const insertSortedPosition = sortedPositionAtLevel[groundLevel];

        for (let spliceLevel = groundLevel; spliceLevel < newNodeLevel; spliceLevel++) {
          const nodeBeforeInsert = nodeBeforeInsertAtLevel[spliceLevel];
          const oldNext = nodeBeforeInsert.forward[spliceLevel] ?? null;
          const sortedPositionAtBookmark = sortedPositionAtLevel[spliceLevel];
          const distanceFromBookmarkToInsert = insertSortedPosition - sortedPositionAtBookmark;
          const oldSpanFromBookmarkToOldNext = nodeBeforeInsert.span[spliceLevel];

          newNode.forward[spliceLevel] = oldNext;
          nodeBeforeInsert.forward[spliceLevel] = newNode;

          const spanFromBookmarkToNewNode = distanceFromBookmarkToInsert + 1;
          const spanFromNewNodeToOldNext = oldSpanFromBookmarkToOldNext - distanceFromBookmarkToInsert;

          nodeBeforeInsert.span[spliceLevel] = spanFromBookmarkToNewNode;
          newNode.span[spliceLevel] = spanFromNewNodeToOldNext;

          this.snapshot(
            `Splice level ${spliceLevel}`,
            caseId,
            "One old arrow is split into two arrows: bookmark to new node, then new node to old next.",
            {
              spliceLevel,
              nodeBeforeInsert: nodeBeforeInsert.label(),
              oldNext: oldNext ? oldNext.label() : "nil",
              insertSortedPosition,
              sortedPositionAtBookmark,
              distanceFromBookmarkToInsert,
              oldSpanFromBookmarkToOldNext,
              spanFromBookmarkToNewNode,
              spanFromNewNodeToOldNext
            },
            `spanFromBookmarkToNewNode := distanceFromBookmarkToInsert + 1\nspanFromNewNodeToOldNext := oldSpanFromBookmarkToOldNext - distanceFromBookmarkToInsert`
          );
        }

        for (let untouchedLevel = newNodeLevel; untouchedLevel < this.level; untouchedLevel++) {
          const nodeBeforeInsert = nodeBeforeInsertAtLevel[untouchedLevel];
          const spanBeforeInsert = nodeBeforeInsert.span[untouchedLevel];
          nodeBeforeInsert.span[untouchedLevel] = spanBeforeInsert + 1;

          this.snapshot(
            `Bump untouched level ${untouchedLevel}`,
            "insert-short-node",
            "The new node is too short for this level, so the pointer stays the same but its span grows by one.",
            {
              untouchedLevel,
              nodeBeforeInsert: nodeBeforeInsert.label(),
              spanBeforeInsert,
              spanAfterInsert: nodeBeforeInsert.span[untouchedLevel]
            },
            `spanBeforeInsert := nodeBeforeInsert.spanToNextAtLevel(untouchedLevel)\nnodeBeforeInsert.span = spanBeforeInsert + 1`
          );
        }

        this.length++;
        this.snapshot(
          `Finish Insert("${member}")`,
          caseId,
          "Length increases after pointers and spans are correct.",
          { length: this.length, groundChain: this.serialize().ground.map(item => `${item.rank}:${item.member}`).join(" -> ") },
          `skipList.length++`
        );
      }

      getRank(score, member) {
        let memberRank = 0;
        let current = this.head;
        const topLevel = this.level - 1;

        this.snapshot(
          `Start GetRank("${member}")`,
          "get-rank",
          "Search for the node immediately before the target; rank counts skipped ground-chain members.",
          { target: member, memberRank, current: "HEAD", topLevel },
          `memberRank := 0\ncurrent := HEAD`
        );

        for (let searchLevel = topLevel; searchLevel >= groundLevel; searchLevel--) {
          while (true) {
            const nextNode = current.forward[searchLevel];
            if (!nextNode) break;
            if (this.compare(nextNode, score, member) >= 0) break;

            const skipped = current.span[searchLevel];
            memberRank += skipped;
            current = nextNode;

            this.snapshot(
              `GetRank hop on level ${searchLevel}`,
              "get-rank",
              "The next node is before the target, so add the span and hop.",
              { searchLevel, skipped, memberRank, current: current.label() },
              `memberRank += current.spanToNextAtLevel(searchLevel)\ncurrent = nextNode`
            );
          }
        }

        const targetNode = current.forward[groundLevel];
        const found = Boolean(targetNode && targetNode.member === member && targetNode.score === score);
        this.snapshot(
          `Finish GetRank("${member}")`,
          "get-rank",
          found ? "The target is the next ground-chain node, so the accumulated rank is the answer." : "The target was not found.",
          { targetNode: targetNode ? targetNode.label() : "nil", found, memberRank },
          `targetNode := current.nextOnGroundChain()\nreturn memberRank if targetNode is target`
        );
      }

      rangeByRank(startIndex, stopIndex) {
        let targetSortedPosition = startIndex + 1;
        let traversedGroundChainMembers = 0;
        let current = this.head;
        const topLevel = this.level - 1;

        this.snapshot(
          `Start RangeByRank(${startIndex}, ${stopIndex})`,
          "range-by-rank",
          "First jump to the start rank using spans, then collect on the ground chain.",
          { startIndex, stopIndex, targetSortedPosition, traversedGroundChainMembers },
          `targetSortedPosition := startIndex + 1\ntraversedGroundChainMembers := 0`
        );

        for (let searchLevel = topLevel; searchLevel >= groundLevel; searchLevel--) {
          while (true) {
            const nextNode = current.forward[searchLevel];
            if (!nextNode) break;

            const spanToNext = current.span[searchLevel];
            const wouldOvershoot = traversedGroundChainMembers + spanToNext > targetSortedPosition;
            if (wouldOvershoot) break;

            traversedGroundChainMembers += spanToNext;
            current = nextNode;

            this.snapshot(
              `Range jump on level ${searchLevel}`,
              "range-by-rank",
              "This hop does not overshoot the target rank, so take it.",
              { searchLevel, spanToNext, traversedGroundChainMembers, current: current.label() },
              `if traversed + spanToNext <= targetSortedPosition:\n    traversed += spanToNext\n    current = nextNode`
            );
          }
        }

        const members = [];
        for (let rank = startIndex, node = current; rank <= stopIndex && node; rank++, node = node.forward[groundLevel]) {
          members.push(node.member);
          this.snapshot(
            `Collect rank ${rank}`,
            "range-by-rank",
            "After the jump, range collection is simple level-0 walking.",
            { rank, collected: members.join(", "), current: node.label() },
            `members = append(members, current.member)\ncurrent = current.nextOnGroundChain()`
          );
        }
      }
    }

    const steps = [];
    const skipList = new WalkthroughSkipList();

    skipList.insert(40.2, "paz", 3, "insert-tall-node");
    skipList.insert(20.0, "baz", 1, "insert-front");
    skipList.insert(100.0, "foo", 2, "insert-tail");
    skipList.insert(30.1, "caz", 1, "insert-middle");
    skipList.insert(100.0, "bar", 1, "insert-short-node");
    skipList.getRank(100.0, "bar");
    skipList.rangeByRank(1, 3);

    let currentStepIndex = 0;

    const stepTitle = document.getElementById("stepTitle");
    const caseChip = document.getElementById("caseChip");
    const stepCounter = document.getElementById("stepCounter");
    const explain = document.getElementById("explain");
    const state = document.getElementById("state");
    const groundChain = document.getElementById("groundChain");
    const debugValues = document.getElementById("debugValues");
    const codeShape = document.getElementById("codeShape");
    const stepSelect = document.getElementById("stepSelect");

    steps.forEach((step, index) => {
      const option = document.createElement("option");
      option.value = String(index);
      option.textContent = `${index + 1}. ${step.caseId}: ${step.title}`;
      stepSelect.appendChild(option);
    });

    document.getElementById("previous").addEventListener("click", () => showStep(Math.max(0, currentStepIndex - 1)));
    document.getElementById("next").addEventListener("click", () => showStep(Math.min(steps.length - 1, currentStepIndex + 1)));
    document.getElementById("reset").addEventListener("click", () => showStep(0));
    stepSelect.addEventListener("change", event => showStep(Number(event.target.value)));

    document.querySelectorAll("[data-case]").forEach(button => {
      button.addEventListener("click", () => {
        const caseId = button.getAttribute("data-case");
        const index = steps.findIndex(step => step.caseId === caseId);
        if (index >= 0) showStep(index);
      });
    });

    function showStep(index) {
      currentStepIndex = index;
      const step = steps[index];
      stepTitle.textContent = step.title;
      caseChip.textContent = step.caseId;
      stepCounter.textContent = `${index + 1} / ${steps.length}`;
      explain.textContent = step.explain;
      codeShape.textContent = step.code || "";
      stepSelect.value = String(index);

      renderLevels(step.list.levels);
      renderGround(step.list.ground);
      renderDebug(step.debug);
    }

    function renderLevels(levels) {
      state.innerHTML = "";
      levels.forEach(({ level, lane }) => {
        const row = document.createElement("div");
        row.className = "level-row";

        const label = document.createElement("div");
        label.className = "level-name";
        label.textContent = level === 0 ? "level 0" : `level ${level}`;

        const laneElement = document.createElement("div");
        laneElement.className = "lane";

        lane.forEach((node, index) => {
          laneElement.appendChild(renderNode(node));
          if (node.hasNext) {
            laneElement.appendChild(renderEdge(node.span));
          }
        });

        row.appendChild(label);
        row.appendChild(laneElement);
        state.appendChild(row);
      });
    }

    function renderNode(node) {
      const nodeElement = document.createElement("div");
      nodeElement.className = node.member === "HEAD" ? "node head" : "node";

      const member = document.createElement("div");
      member.className = "member";
      member.textContent = node.member;

      const score = document.createElement("div");
      score.className = "score";
      score.textContent = node.member === "HEAD" ? "sentinel" : `score ${node.score}`;

      nodeElement.appendChild(member);
      nodeElement.appendChild(score);
      return nodeElement;
    }

    function renderEdge(span) {
      const edge = document.createElement("div");
      edge.className = "edge";

      const label = document.createElement("div");
      label.className = "span-label";
      label.textContent = `span ${span}`;

      edge.appendChild(label);
      return edge;
    }

    function renderGround(ground) {
      groundChain.innerHTML = "";
      if (ground.length === 0) {
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = "empty";
        groundChain.appendChild(empty);
        return;
      }

      ground.forEach(item => {
        const element = document.createElement("div");
        element.className = "ground-item";
        element.innerHTML = `<div class="member">${item.member}</div><div class="score">score ${item.score}</div><div class="rank">rank ${item.rank}</div>`;
        groundChain.appendChild(element);
      });
    }

    function renderDebug(debug) {
      debugValues.innerHTML = "";
      Object.entries(debug).forEach(([label, value]) => {
        const card = document.createElement("div");
        card.className = "debug-card";
        card.innerHTML = `<div class="debug-label">${label}</div><div class="debug-value">${String(value)}</div>`;
        debugValues.appendChild(card);
      });
    }

    function printableArray(values, length) {
      return values.slice(0, length).map((value, index) => `L${index}:${value}`).join("  ");
    }

    function printableNodes(nodes, length) {
      return nodes.slice(0, length).map((node, index) => `L${index}:${node ? node.label() : "-"}`).join("  ");
    }

    showStep(0);
  </script>
</body>
</html>
